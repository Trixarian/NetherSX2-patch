name: Build NetherSX2
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: ./builder/build-nethersx2.sh
        run: |
          chmod +x build-nethersx2.sh
          ./build-nethersx2.sh
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Patched-APK
          path: PatchedAPK/*.apk
